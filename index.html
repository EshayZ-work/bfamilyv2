<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B.Family Sales Entry</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    .iframe-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ดึง iframe ขึ้น 40px เพื่อซ่อน banner "This application was created by..." ที่อยู่ด้านบน
       และเพิ่มความสูง +40px เพื่อให้ content ของฟอร์มเต็มจอ */
    iframe {
      position: absolute;
      top: -40px;
      left: 0;
      width: 100%;
      height: calc(100% + 40px);
      border: none;
      display: block;
    }

    /* Loading state ตอนกำลังโหลด iframe */
    .loader {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-family: 'Kanit', -apple-system, sans-serif;
      color: #666;
      z-index: -1;
    }

    .loader .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f0f0f0;
      border-top-color: #ff6b35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <div>กำลังโหลดฟอร์ม...</div>
  </div>

  <div class="iframe-wrapper">
    <iframe 
      src="https://script.google.com/macros/s/AKfycbxkQuLEr3jfUWzN0XFKYcOeW8zQl4MBaVBVBUQqC_JXNXJzXI3iVgDRXHjgl9nHPFkR/exec"
      title="Sales Entry Form"
      allow="clipboard-write">
    </iframe>
  </div>
</body>
</html>
